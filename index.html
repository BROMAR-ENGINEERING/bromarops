<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bromar Ops</title>

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="16x16"   href="assets/icons/graphite-16.png">
  <link rel="icon" type="image/png" sizes="32x32"   href="assets/icons/graphite-32.png">
  <link rel="icon" type="image/png" sizes="72x72"   href="assets/icons/graphite-72.png">
  <link rel="icon" type="image/png" sizes="96x96"   href="assets/icons/graphite-96.png">
  <link rel="icon" type="image/png" sizes="128x128" href="assets/icons/graphite-128.png">
  <link rel="icon" type="image/png" sizes="144x144" href="assets/icons/graphite-144.png">
  <link rel="apple-touch-icon"      sizes="152x152" href="assets/icons/graphite-152.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/graphite-192.png">
  <link rel="icon" type="image/png" sizes="384x384" href="assets/icons/graphite-384.png">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ea580c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bromar Ops">
  <meta name="format-detection" content="telephone=no">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app"></div>

  <!-- Page modules -->
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/jobs.js"></script>
  <script src="js/pages/quotes.js"></script>
  <script src="js/pages/scheduling.js"></script>
  <script src="js/pages/timesheets.js"></script>
  <script src="js/pages/employees.js"></script>
  <script src="js/pages/safety.js"></script>
  <script src="js/pages/fleet.js"></script>
  <script src="js/pages/equipment.js"></script>
  <script src="js/pages/clients.js"></script>
  <script src="js/pages/tasks.js"></script>
  <script src="js/pages/materials.js"></script>
  <script src="js/pages/admin.js"></script>

  <!-- Sub-modules -->
  <script src="js/pages/testtag.js"></script>

  <!-- Core last -->
  <script src="js/core.js"></script>

  <!-- PWA service worker registration + iOS gesture block -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('gesturechange', e => e.preventDefault());
  </script>
</body>
</html>
