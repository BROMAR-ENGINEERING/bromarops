<!--
  BROMAR OPS — LOGIN
  V1.00
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sign in — Bromar Ops</title>

  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/graphite-32.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/graphite-152.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ea580c">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="css/styles.css">
  <style>
    .login-page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      padding-top: calc(2rem + env(safe-area-inset-top));
      padding-bottom: calc(2rem + env(safe-area-inset-bottom));
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 8px 32px var(--shadow);
      animation: fadeIn 0.5s ease backwards;
    }
    .login-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .login-logo img { height: 36px; width: auto; }
    .login-logo .light-logo { display: block; }
    .login-logo .dark-logo  { display: none; }
    [data-theme="dark"] .login-logo .light-logo { display: none; }
    [data-theme="dark"] .login-logo .dark-logo  { display: block; }
    .login-title {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    .login-subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 1.75rem;
    }
    .form-field {
      margin-bottom: 1rem;
    }
    .form-field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: var(--text-primary);
    }
    .form-field input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-main);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }
    .form-field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(234,88,12,0.1);
    }
    .login-error {
      display: none;
      background: var(--error-bg);
      color: var(--error);
      border-radius: var(--radius-sm);
      padding: 0.7rem 0.9rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .login-error.show { display: block; }
    .login-btn {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color: white;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 0.5rem;
    }
    .login-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(234,88,12,0.3);
    }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-foot {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .login-foot a { color: var(--accent); text-decoration: none; }
    .login-foot a:hover { text-decoration: underline; }
    .theme-toggle-corner {
      position: fixed;
      top: calc(1rem + env(safe-area-inset-top));
      right: 1rem;
    }
  </style>
</head>
<body>
  <button class="control-btn theme-toggle-corner" id="theme-toggle" aria-label="Toggle theme">
    <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  </button>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <img class="light-logo" src="assets/logo/bromar-logo-colour.png" alt="Bromar">
        <img class="dark-logo"  src="assets/logo/bromar-logo-white.png"  alt="Bromar">
      </div>
      <h1 class="login-title">Bromar Ops</h1>
      <p class="login-subtitle">Sign in to continue</p>

      <div class="login-error" id="login-error"></div>

      <form id="login-form">
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" required>
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn" id="login-btn">Sign in</button>
      </form>

      <div class="login-foot">
        Access is by invitation only. Contact your administrator.
      </div>
    </div>
  </div>

  <div class="revision-number">V1.00</div>

  <script src="js/auth.js"></script>
  <script>
    // Theme toggle (standalone — core.js isn't loaded on this page)
    const THEME_KEY = 'bromar_ops_theme';
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem(THEME_KEY, t);
    }
    applyTheme(localStorage.getItem(THEME_KEY) || 'light');
    document.getElementById('theme-toggle').addEventListener('click', () => {
      applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    document.addEventListener('bromar-auth-ready', () => {
      const form = document.getElementById('login-form');
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errEl.classList.remove('show');
        btn.disabled = true;
        btn.textContent = 'Signing in…';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
          errEl.textContent = error.message || 'Sign-in failed.';
          errEl.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Sign in';
          return;
        }
        location.replace('index.html');
      });
    });
  </script>
</body>
</html>
